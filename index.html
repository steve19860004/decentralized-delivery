<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- 防快取機制 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>品勝外送 - 探索在地美味</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="text-gray-800 antialiased h-screen overflow-hidden flex flex-col">

    <!-- 頂部導航列 -->
    <header class="bg-white shadow-sm z-20 flex-shrink-0 px-4 py-3 flex justify-between items-center relative">
        <div class="flex items-center gap-2">
            <div
                class="h-8 w-8 bg-gradient-to-tr from-blue-600 to-indigo-500 rounded-lg flex items-center justify-center text-white font-black text-xl shadow-inner">
                P</div>
            <h1 class="font-black text-xl tracking-tight text-gray-800">品勝外送</h1>
        </div>
        <div class="text-xs text-gray-500 font-medium">✨ 探索在地美味</div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 overflow-y-auto px-4 pb-20 pt-4 relative hide-scrollbar">

        <!-- 歡迎橫幅 -->
        <div
            class="bg-gradient-to-r from-blue-600 to-indigo-600 rounded-2xl p-6 text-white shadow-lg mb-8 relative overflow-hidden">
            <div class="absolute -right-4 -bottom-4 opacity-20 text-8xl">🍔</div>
            <h2 class="text-2xl font-black mb-2 relative z-10">今晚，我想來點...</h2>
            <p class="text-blue-100 text-sm font-medium relative z-10">探索各家精選餐廳的獨家菜單</p>
        </div>

        <!-- 餐廳列表區塊 -->
        <div id="store-list-container" class="space-y-6">
            <!-- 骨架屏載入動畫 -->
            <div class="animate-pulse space-y-4">
                <div class="h-10 bg-gray-200 rounded w-1/3"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="h-32 bg-gray-200 rounded-xl"></div>
                    <div class="h-32 bg-gray-200 rounded-xl"></div>
                </div>
            </div>
        </div>

        <!-- 頁尾宣告與秘密入口 -->
        <footer class="mt-12 text-center text-gray-400 text-xs pb-6">
            <p>Powered by Pin Sheng Protocol</p>
            <a href="admin.html"
                class="inline-block mt-4 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-500 transition">💼
                合作夥伴與員工登入</a>
        </footer>

        <!-- 下單結帳 Modal (隱藏) -->
        <div id="checkout-modal"
            class="fixed inset-0 z-50 hidden flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm transition-opacity">
            <div class="bg-white w-full sm:w-96 rounded-t-2xl sm:rounded-2xl shadow-2xl overflow-hidden transform transition-transform translate-y-full sm:translate-y-0 duration-300"
                id="checkout-modal-content">
                <div class="px-5 py-4 border-b border-gray-100 flex justify-between items-center bg-indigo-50">
                    <h3 class="font-bold text-indigo-900 text-lg">確認您的餐點</h3>
                    <button onclick="closeCheckout()"
                        class="text-indigo-400 hover:text-indigo-600 bg-indigo-100 hover:bg-indigo-200 rounded-full w-8 h-8 flex items-center justify-center transition">✕</button>
                </div>
                <div class="p-5">
                    <form id="checkout-form" class="space-y-4">
                        <input type="hidden" id="checkout-restaurant-id">
                        <input type="hidden" id="checkout-item-name">
                        <input type="hidden" id="checkout-price">

                        <div
                            class="bg-gray-50 p-3 rounded-lg border border-gray-100 mb-4 flex justify-between items-center">
                            <div>
                                <div class="text-xs text-gray-500 mb-1" id="checkout-restaurant-name">店家名稱</div>
                                <div class="font-bold text-gray-800" id="checkout-item-display">餐點名稱</div>
                            </div>
                            <div class="text-right">
                                <div class="text-xs text-gray-400">單價: <span id="checkout-unit-price">$0</span></div>
                                <div class="text-indigo-600 font-black text-xl mt-1" id="checkout-price-display">$0
                                </div>
                            </div>
                        </div>

                        <!-- 數量選擇器 -->
                        <div class="flex items-center justify-between bg-white p-3 rounded-lg border border-gray-200">
                            <label class="text-sm font-bold text-gray-700">選擇數量</label>
                            <div class="flex items-center gap-3">
                                <button type="button" onclick="updateQuantity(-1)"
                                    class="w-8 h-8 rounded-full bg-gray-100 text-gray-600 font-bold hover:bg-gray-200 transition">-</button>
                                <span id="checkout-quantity-display" class="font-bold w-4 text-center">1</span>
                                <input type="hidden" id="checkout-quantity" value="1">
                                <button type="button" onclick="updateQuantity(1)"
                                    class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 font-bold hover:bg-indigo-200 transition">+</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">送達距離 (運費計算) <span
                                    class="text-red-500">*</span></label>
                            <select id="checkout-distance"
                                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
                                onchange="updateQuantity(0)">
                                <option value="30">🛵 步行/同社區內 (距離約 500m) - 運費 $30</option>
                                <option value="50" selected>🛵 附近區域 (距離約 1~2km) - 運費 $50</option>
                                <option value="80">🛵 跨區外送 (距離約 2~5km) - 運費 $80</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">聯絡電話 <span
                                    class="text-red-500">*</span></label>
                            <input type="tel" id="checkout-phone" required placeholder="例如: 0912345678"
                                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">外送地址 <span
                                    class="text-red-500">*</span></label>
                            <input type="text" id="checkout-address" required placeholder="請填寫完整地址 (含樓層)"
                                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-1">備註 (選填)</label>
                            <input type="text" id="checkout-note" placeholder="例如: 到了請打電話"
                                class="w-full p-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>

                        <div id="checkout-error"
                            class="hidden text-xs text-red-500 text-center font-bold bg-red-50 p-2 rounded"></div>

                        <button type="submit" id="checkout-submit-btn"
                            class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 hover:from-indigo-700 hover:to-blue-700 text-white font-bold py-3 rounded-xl mt-2 transition shadow-lg shadow-indigo-200">
                            🛵 確認送出訂單
                        </button>
                    </form>
                </div>
            </div>
        </div>

    </main>

    <!-- Supabase 核心套件 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 引入獨立的商店端邏輯 -->
    <script src="app-store.js?v=1.0.0"></script>
</body>

</html>
