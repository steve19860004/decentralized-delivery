<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>品勝外送協議 (TMA)</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 引入自訂樣式 -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-100 text-gray-800 font-sans antialiased">

    <!-- 頂部導覽列與身份切換 -->
    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
        <h1 class="text-xl font-bold">品勝外送協議</h1>
        <div class="flex items-center gap-3">
            <div id="role-display" class="hidden text-sm">
                <label for="role-select" class="mr-1">身份:</label>
                <select id="role-select"
                    class="text-gray-900 bg-white rounded p-1 text-sm border-none shadow-sm focus:ring">
                </select>
            </div>
            <button id="logout-btn"
                class="hidden text-xs bg-red-500 hover:bg-red-600 px-2 py-1 rounded transition">登出</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto h-[calc(100vh-70px)] overflow-y-auto pb-20">

        <!-- ========================================== -->
        <!-- 登入視圖 (Login View) -->
        <!-- ========================================== -->
        <section id="login-view" class="animate-fade-in py-10">
            <div class="bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
                <div class="text-center mb-8">
                    <div class="text-5xl mb-3">🛡️</div>
                    <h2 class="text-2xl font-black text-gray-800">安全登入</h2>
                    <p class="text-gray-500 text-sm mt-1">請輸入您的帳號密碼以開始操作</p>
                </div>
                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Email</label>
                        <input type="email" id="login-email" required placeholder="example@pingsheng.com"
                            class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">密碼</label>
                        <input type="password" id="login-password" required placeholder="••••••••"
                            class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-200 transition transform active:scale-95">
                        立即登入
                    </button>
                </form>
                <p id="login-error" class="text-red-500 text-xs text-center mt-4 hidden"></p>
            </div>
        </section>

        <!-- ========================================== -->
        <!-- 餐廳端視圖 (Restaurant View) -->
        <!-- ========================================== -->
        <section id="restaurant-view" class="hidden animate-fade-in">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span>🏪</span> 發布新訂單
            </h2>

            <form id="order-form" class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-6 space-y-4">

                <!-- 新增：快速選單 -->
                <div id="quick-menu" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-2">快速點餐</label>
                    <div id="menu-items" class="grid grid-cols-2 gap-2">
                        <!-- 由 JS 根據餐廳動態載入 -->
                    </div>
                    <div class="text-right mt-2">
                        <button type="button" onclick="clearMenu()"
                            class="text-xs text-red-500 hover:text-red-700">清空已選</button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">已選餐點內容</label>
                    <input type="text" id="order-desc" required placeholder="請點擊上方選單或手動輸入..."
                        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">客戶實付總額 ($)</label>
                    <input type="number" id="order-amount" required placeholder="0"
                        class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition font-bold text-lg text-blue-700 bg-gray-50">
                </div>
                <!-- 預覽分潤 -->
                <div class="bg-blue-50 p-3 rounded-lg text-sm text-blue-800 border border-blue-100">
                    <p>💡 此單發布後：</p>
                    <ul class="list-disc list-inside mt-1 ml-1">
                        <li>您 (餐廳) 將實收：<span id="preview-res" class="font-bold">0</span> 元 (75%)</li>
                        <li>外送員將獲取：<span id="preview-drv" class="font-bold">0</span> 元 (20%)</li>
                    </ul>
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition transform active:scale-95">
                    🚀 廣播此訂單
                </button>
            </form>

            <!-- 圖文菜單管理 -->
            <h3 class="font-bold text-gray-700 mb-2 border-b pb-1 mt-6">🍽️ 我的菜單管理</h3>
            <div class="bg-indigo-50 p-4 rounded-xl shadow-inner mb-8 border border-indigo-100">
                <form id="menu-form" class="space-y-3 mb-4">
                    <div class="flex gap-2">
                        <input type="text" id="menu-name" placeholder="輸入菜色名稱 (例: 招牌牛肉麵)" required
                            class="flex-1 p-2 border border-indigo-200 rounded-lg text-sm">
                        <input type="number" id="menu-price" placeholder="價格 $" required min="0"
                            class="w-24 p-2 border border-indigo-200 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-indigo-700 mb-1 font-bold">上傳餐點圖片</label>
                        <input type="file" id="menu-image" accept="image/png, image/jpeg, image/jpg, image/webp"
                            class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-100 file:text-indigo-700 hover:file:bg-indigo-200">
                    </div>
                    <button type="submit" id="menu-submit-btn"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg text-sm shadow transition flex justify-center items-center gap-2">
                        <span>➕ 上架新餐點</span>
                        <div id="menu-spinner" class="hidden animate-spin rounded-full h-4 w-4 border-b-2 border-white">
                        </div>
                    </button>
                    <p id="menu-upload-msg" class="text-xs text-center hidden"></p>
                </form>

                <!-- 菜單展示庫 (Gallery) -->
                <div id="restaurant-menu-gallery" class="grid grid-cols-2 gap-3 mt-4">
                    <!-- 預設載入狀態 -->
                    <div class="col-span-2 text-center text-xs text-gray-500 py-2">載入菜單中...</div>
                </div>
            </div>

            <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">🕒 歷史訂單紀錄</h3>
            <div id="restaurant-history" class="space-y-3">
                <!-- 餐廳歷史訂單由 JS 載入 -->
                <div class="text-center text-gray-500 text-sm py-4">載入中...</div>
            </div>
        </section>


        <!-- ========================================== -->
        <!-- 師傅端視圖 (Master / Driver View) -->
        <!-- ========================================== -->
        <section id="master-view" class="hidden animate-fade-in">

            <!-- 信用大腦儀表板 -->
            <div
                class="bg-gradient-to-br from-indigo-900 to-blue-800 text-white p-5 rounded-xl shadow-lg mb-6 relative overflow-hidden">
                <!-- 裝飾背景 -->
                <div class="absolute -right-10 -top-10 opacity-20 text-9xl">🏆</div>

                <h2 class="text-lg font-bold mb-1 opacity-90">您的去中心化信用評等</h2>
                <div class="flex items-end gap-2 mb-4">
                    <span id="master-score" class="text-4xl font-black text-yellow-400 drop-shadow-md">---</span>
                    <span class="text-sm opacity-80 mb-1">分 (Reputation Score)</span>
                </div>

                <div class="grid grid-cols-2 gap-4 text-sm bg-white/10 rounded-lg p-3 backdrop-blur-sm">
                    <div>
                        <div class="opacity-70 text-xs">完單率</div>
                        <div id="master-success-rate" class="font-bold text-lg">--%</div>
                    </div>
                    <div>
                        <div class="opacity-70 text-xs">平均星級</div>
                        <div id="master-avg-rating" class="font-bold text-lg flex items-center gap-1">-- <span
                                class="text-yellow-400">★</span></div>
                    </div>
                </div>
            </div>

            <!-- 任務池 -->
            <div class="flex justify-between items-end mb-3 border-b pb-2">
                <h3 class="text-xl font-bold flex items-center gap-2">
                    <span>🛵</span> 可接新任務
                </h3>
                <span id="live-indicator" class="flex h-3 w-3 relative">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
                </span>
            </div>

            <div id="job-pool" class="space-y-4 mb-8">
                <!-- 可接單任務由 JS 載入 -->
                <div
                    class="text-center text-gray-500 text-sm py-8 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                    目前內湖區沒有新訂單 👀
                </div>
            </div>

            <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">✅ 我完成的訂單</h3>
            <div id="master-history" class="space-y-3">
                <!-- 師傅歷史訂單由 JS 載入 -->
            </div>
        </section>

        <!-- ========================================== -->
        <!-- 管理員視圖 (Admin View) -->
        <!-- ========================================== -->
        <section id="admin-view" class="hidden animate-fade-in">
            <h2 class="text-2xl font-bold mb-4 flex items-center gap-2">
                <span>⚙️</span> 平台管理中心
            </h2>

            <!-- 新增成員表單 -->
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 mb-8">
                <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                    <span>👤</span> 新增店家或師傅
                </h3>
                <form id="admin-add-user" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">電子郵件 (Email)</label>
                        <input type="email" id="new-user-email" required placeholder="user@example.com"
                            class="w-full p-2 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">顯示名稱 (Name)</label>
                        <input type="text" id="new-user-name" required placeholder="例如：林師傅 / 好好味餐廳"
                            class="w-full p-2 border border-gray-300 rounded-lg">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">分配角色 (Role)</label>
                        <select id="new-user-role" class="w-full p-2 border border-gray-300 rounded-lg">
                            <option value="master">🛵 外送師傅 (Master)</option>
                            <option value="restaurant">🏪 合作餐廳 (Restaurant)</option>
                        </select>
                    </div>
                    <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg shadow transition">
                        建立權限並寄送邀請
                    </button>
                    <p id="admin-msg" class="text-xs text-center mt-2"></p>
                </form>
            </div>

            <h3 class="font-bold text-gray-700 mb-2 border-b pb-1">📋 全平台人員名單</h3>
            <div id="admin-user-list" class="space-y-2">
                <!-- 管理員查看的人員列表 -->
            </div>
        </section>

    </main>

    <!-- 載入中遮罩 -->
    <div id="loading-overlay"
        class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex flex-col items-center justify-center hidden">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
        <p class="text-blue-800 font-medium animate-pulse">與 Supabase 區塊網格同步中...</p>
    </div>

    <!-- 引入主邏輯 (全新檔名強烈繞過惡劣快取) -->
    <script src="app-v5.js?v=2.1.2"></script>
</body>

</html>
